services:

  order-service:
    build:
      context: ..
      dockerfile: order-service/Dockerfile

    container_name: order-service
    restart: no
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/order_service
      SPRING_DATASOURCE_USERNAME: order_user
      SPRING_DATASOURCE_PASSWORD: order_password

    # Waits for Postgres to be fully ready before starting during Spring boot up
    depends_on:
      postgres-order:
        condition: service_healthy

  postgres-order:
    image: 'postgres:latest'
    container_name: postgres-order
    restart: no
    ports:
      - "5431:5432"

    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_order_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d order_service"]
      interval: 10s
      timeout: 5s
      retries: 4

  pgadmin-order:
    image: dpage/pgadmin4:latest
    container_name: order-pgadmin
    restart: no
    ports:
      - "5050:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@comp3095.ca
      PGADMIN_DEFAULT_PASSWORD: password

    depends_on:
      postgres-order:
        condition: service_healthy

    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_order_data:
  pgadmin_data: