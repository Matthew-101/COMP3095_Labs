order-service:
  version: v1.0

spring:
  application:
    name: order-service


  datasource:
    # default port for postgresql is 5432
    # docker network connections
    url: jdbc:postgresql://postgres-order:5432/order_service


    username: order_user
    password: order_password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

    #  Options for controlling how Hibernate handles schema management:
    # none         - No schema generation or validation (delegate to Flyway)
    # validate     - Validate schema against entity mappings; fails is mismatched
    # update       - Add missing columns/tables; never removes anything
    # create       - Drops and recreates schema on every startup (destroy data)
    # create-drop  - Like create, but also drop schema on app shutdown (good for integration test)
    hibernate:
      ddl-auto: none

server:
  port: 8082

inventory:
  service:
    url:  http://inventory-service:8083

# Swagger GUI Documentation  for Endpoints
# http://localhost:8082/swagger-ui
springdoc:
  swagger-ui:
    path: /swagger-ui

  # Swagger API Documentation  for Endpoints
  # http://localhost:8082/api-docs
  api-docs:
    path: /api-docs
